<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mmWave Radar Visualizer</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='58' r='3' fill='%234fc3f7'/><path d='M32 58 L8 10 A50 50 0 0 1 56 10 Z' fill='%230f0f23' stroke='%234fc3f7' stroke-width='1.5'/><path d='M32 58' fill='none' stroke='%231a2a4a' stroke-width='0.5'/><circle cx='32' cy='58' r='12' fill='none' stroke='%231a2a4a' stroke-width='0.5'/><circle cx='32' cy='58' r='24' fill='none' stroke='%231a2a4a' stroke-width='0.5'/><circle cx='32' cy='58' r='36' fill='none' stroke='%231a2a4a' stroke-width='0.5'/><circle cx='28' cy='30' r='4' fill='%234fc3f7'/><circle cx='28' cy='30' r='7' fill='none' stroke='%234fc3f7' stroke-width='1' opacity='0.5'/><circle cx='42' cy='42' r='3' fill='%23f44336'/><circle cx='42' cy='42' r='6' fill='none' stroke='%23f44336' stroke-width='1' opacity='0.5'/></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: 'Courier New', monospace; }
  .container { display: flex; height: 100vh; }
  .radar-panel { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
  canvas { background: #0f0f23; border-radius: 8px; cursor: crosshair; }
  .side-panel {
    width: 340px; background: #16213e; padding: 16px; overflow-y: auto;
    border-left: 1px solid #333;
  }
  .side-panel h2 { color: #4fc3f7; margin-bottom: 12px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
  .side-panel h3 { color: #81d4fa; margin: 12px 0 6px; font-size: 12px; }
  label { display: block; margin: 6px 0 2px; font-size: 12px; color: #999; }
  label.inline { display: inline-flex; align-items: center; gap: 4px; }
  input, select {
    width: 100%; padding: 6px 8px; background: #0f0f23; border: 1px solid #333;
    color: #e0e0e0; font-family: inherit; font-size: 13px; border-radius: 4px; margin-bottom: 4px;
  }
  input[type="checkbox"] { width: auto; }
  input[type="range"] { padding: 0; }
  input[type="file"] { font-size: 11px; }
  input:focus, select:focus { border-color: #4fc3f7; outline: none; }
  button {
    padding: 8px 16px; background: #1a6b3c; border: none; color: white;
    cursor: pointer; font-family: inherit; font-size: 13px; border-radius: 4px;
    margin: 4px 2px;
  }
  button:hover { background: #228b4a; }
  button.danger { background: #8b2222; }
  button.danger:hover { background: #a52a2a; }
  button.secondary { background: #2a4a6b; }
  button.secondary:hover { background: #3a5a7b; }
  button.small { padding: 2px 6px; font-size: 11px; }
  .status { padding: 8px; border-radius: 4px; font-size: 12px; margin-bottom: 12px; }
  .status.connected { background: #1a3a1a; color: #4caf50; }
  .status.disconnected { background: #3a1a1a; color: #f44336; }
  .target-list { font-size: 12px; }
  .target-item {
    padding: 6px 8px; margin: 4px 0; background: #0f0f23; border-radius: 4px;
    border-left: 3px solid;
  }
  .device-item {
    padding: 8px; margin: 4px 0; background: #0f0f23; border-radius: 4px;
    border-left: 3px solid; font-size: 12px;
  }
  .device-item .device-header { display: flex; justify-content: space-between; align-items: center; }
  .device-item .device-stats { margin-top: 4px; color: #888; }
  .device-offset { margin-top: 4px; }
  .device-offset input { width: 30%; display: inline-block; margin: 1px; font-size: 11px; padding: 3px 4px; }
  .device-offset label { display: inline; font-size: 10px; color: #666; }
  .zone-item {
    padding: 8px; margin: 4px 0; background: #0f0f23; border-radius: 4px;
    border-left: 3px solid; font-size: 12px;
  }
  .zone-item .zone-header { display: flex; justify-content: space-between; align-items: center; }
  .zone-controls { margin-top: 6px; }
  .zone-controls input { width: 45%; display: inline-block; margin: 2px; }
  .zone-controls select { width: 94%; margin: 2px; }
  textarea {
    width: 100%; height: 100px; padding: 6px; background: #0f0f23; border: 1px solid #333;
    color: #e0e0e0; font-family: inherit; font-size: 11px; border-radius: 4px; resize: vertical;
  }
  .info-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
  .info-row .val { color: #4fc3f7; }
  hr { border: none; border-top: 1px solid #333; margin: 12px 0; }
  .preset-grid { display: flex; flex-wrap: wrap; gap: 2px; margin: 4px 0; }
  .preset-btn {
    padding: 3px 6px; font-size: 10px; background: #2a4a6b; border: none;
    color: #ccc; cursor: pointer; border-radius: 3px; white-space: nowrap;
  }
  .preset-btn:hover { background: #3a5a7b; }
  .preset-btn.active { background: #1a6b3c; color: white; }
  .tab-bar { display: flex; gap: 2px; margin-bottom: 8px; }
  .tab {
    padding: 4px 10px; font-size: 11px; background: #0f0f23; border: 1px solid #333;
    color: #888; cursor: pointer; border-radius: 4px 4px 0 0; border-bottom: none;
  }
  .tab.active { background: #16213e; color: #4fc3f7; border-color: #4fc3f7; }
  .floorplan-controls input[type="range"] { width: 100%; }
  .cursor-info {
    position: absolute; bottom: 10px; left: 10px; font-size: 11px; color: #666;
    pointer-events: none; font-family: 'Courier New', monospace;
  }
</style>
</head>
<body>
<div class="container">
  <div class="radar-panel">
    <canvas id="radar"></canvas>
    <div class="cursor-info" id="cursorInfo"></div>
  </div>
  <div class="side-panel">
    <h2>mmWave Radar</h2>

    <div id="status" class="status disconnected">Disconnected</div>

    <h3>Connection</h3>
    <label>Hubitat IP</label>
    <input type="text" id="hubIp" value="10.0.4.20" placeholder="e.g. 192.168.1.100">
    <button onclick="connect()">Connect</button>
    <button class="danger" onclick="disconnect()">Disconnect</button>

    <hr>
    <h3>Devices</h3>
    <div class="preset-grid" id="presetGrid"></div>
    <div id="deviceList"></div>

    <hr>
    <h3>Sensor Info</h3>
    <div class="info-row"><span>Total Targets:</span><span class="val" id="infoTargets">0</span></div>
    <div class="info-row"><span>Update Rate:</span><span class="val" id="infoRate">-</span></div>
    <div id="sensorSummary"></div>
    <div style="font-size:10px; color:#666; margin-top:4px">Illuminance updates every ~60s via WebSocket. If blank, wait or check device page.</div>

    <hr>
    <h3>Active Targets</h3>
    <div id="targetList" class="target-list"><em>No targets</em></div>

    <hr>
    <h3>Zones</h3>
    <div id="zoneList"></div>
    <button onclick="addZone()">+ Add Zone</button>

    <hr>
    <h3>Zone Config</h3>
    <textarea id="zoneJson" placeholder="Paste zone config JSON here..."></textarea>
    <button onclick="importZones()">Import</button>
    <button onclick="exportZones()">Export</button>

    <hr>
    <h3>Floorplan Overlay</h3>
    <label>Load Image</label>
    <input type="file" id="floorplanFile" accept="image/*" onchange="loadFloorplan(this)">
    <label>Or URL</label>
    <input type="text" id="floorplanUrl" placeholder="https://..." onchange="loadFloorplanUrl(this.value)">
    <div class="floorplan-controls">
      <label>Opacity: <span id="fpOpacityVal">0.3</span></label>
      <input type="range" id="fpOpacity" min="0" max="1" step="0.05" value="0.3" oninput="floorplan.opacity=+this.value; document.getElementById('fpOpacityVal').textContent=this.value">
      <label>Scale: <span id="fpScaleVal">1.0</span></label>
      <input type="range" id="fpScale" min="0.1" max="5" step="0.05" value="1" oninput="floorplan.scale=+this.value; document.getElementById('fpScaleVal').textContent=(+this.value).toFixed(2)">
      <label>X Offset (px): <span id="fpXVal">0</span></label>
      <input type="range" id="fpX" min="-500" max="500" value="0" oninput="floorplan.x=+this.value; document.getElementById('fpXVal').textContent=this.value">
      <label>Y Offset (px): <span id="fpYVal">0</span></label>
      <input type="range" id="fpY" min="-500" max="500" value="0" oninput="floorplan.y=+this.value; document.getElementById('fpYVal').textContent=this.value">
      <label>Rotation: <span id="fpRotVal">0</span>&deg;</label>
      <input type="range" id="fpRot" min="0" max="360" value="0" oninput="floorplan.rotation=+this.value; document.getElementById('fpRotVal').textContent=this.value">
    </div>
    <button class="danger small" onclick="clearFloorplan()">Clear Floorplan</button>

    <hr>
    <h3>Display</h3>
    <label>Trail Length</label>
    <input type="range" id="trailLength" min="0" max="100" value="20" oninput="config.trailLength=+this.value">
    <label>Range (meters)</label>
    <input type="range" id="rangeMax" min="2" max="10" value="6" step="0.5" oninput="config.range=this.value*100; resize()">
    <label class="inline"><input type="checkbox" id="showGrid" checked onchange="config.showGrid=this.checked"> Show Grid</label>
    <label class="inline"><input type="checkbox" id="showFov" checked onchange="config.showFov=this.checked"> Show FOV Cone</label>
    <label class="inline"><input type="checkbox" id="showZones" checked onchange="config.showZones=this.checked"> Show Zones</label>
    <label class="inline"><input type="checkbox" id="showHeatmap" onchange="config.showHeatmap=this.checked"> Show Heatmap</label>
    <label class="inline"><input type="checkbox" id="showLabels" checked onchange="config.showLabels=this.checked"> Target Labels</label>
    <button class="secondary small" onclick="clearHeatmap()">Clear Heatmap</button>
  </div>
</div>

<script>
// --- Device Presets (all VZM32-SN switches) ---
const PRESETS = [
  { id: '74',   name: 'Dining',           short: 'Dining' },
  { id: '135',  name: 'West Bedroom',     short: 'W.Bed' },
  { id: '231',  name: 'Front Closet',     short: 'Closet' },
  { id: '1382', name: 'Laundry Room',     short: 'Laundry' },
  { id: '1395', name: 'Downstairs Hall',  short: 'DnHall' },
  { id: '1405', name: 'Theatre',          short: 'Theatre' },
  { id: '1407', name: 'Master Bath Van.', short: 'MBVan' },
  { id: '1412', name: 'Downstairs Bath',  short: 'DnBath' },
  { id: '1414', name: 'Nursery',          short: 'Nursery' },
  { id: '1418', name: 'Master Bath Toi.', short: 'MBToi' },
  { id: '1481', name: 'Stairs Bottom',    short: 'StBot' },
  { id: '1482', name: 'Stairs Top',       short: 'StTop' },
  { id: '1496', name: 'Kitchen',          short: 'Kitchen' },
];

// Color palettes per device (up to 6 devices, each with 4 target colors)
const DEVICE_PALETTES = [
  { base: '#4fc3f7', targets: ['#4fc3f7', '#81d4fa', '#29b6f6', '#0288d1'] },
  { base: '#f44336', targets: ['#f44336', '#ef5350', '#e57373', '#c62828'] },
  { base: '#4caf50', targets: ['#4caf50', '#66bb6a', '#81c784', '#2e7d32'] },
  { base: '#ff9800', targets: ['#ff9800', '#ffa726', '#ffb74d', '#e65100'] },
  { base: '#9c27b0', targets: ['#9c27b0', '#ab47bc', '#ba68c8', '#7b1fa2'] },
  { base: '#00bcd4', targets: ['#00bcd4', '#26c6da', '#4dd0e1', '#00838f'] },
];

const zoneColors = ['#4fc3f744', '#f4433644', '#4caf5044', '#ff980044', '#9c27b044', '#00bcd444', '#ff572244', '#8bc34a44'];
const zoneBorders = ['#4fc3f7', '#f44336', '#4caf50', '#ff9800', '#9c27b0', '#00bcd4', '#ff5722', '#8bc34a'];

let config = { trailLength: 20, range: 600, showGrid: true, showFov: true, showZones: true, showHeatmap: false, showLabels: true };
let ws = null;
let devices = [];  // [{id, name, palette, offsetX, offsetY, targets: {id -> {x,y,z,dop,trail}}, illuminance, motion, lastUpdate, updateCount}]
let zones = [];
let floorplan = { img: null, x: 0, y: 0, scale: 1, rotation: 0, opacity: 0.3 };
let heatmapData = [];  // [{x, y}] in cm coordinates
let rateInterval = null;
let globalUpdateCount = 0;

const canvas = document.getElementById('radar');
const ctx = canvas.getContext('2d');

function resize() {
  const panel = document.querySelector('.radar-panel');
  const size = Math.min(panel.clientWidth - 40, panel.clientHeight - 40);
  canvas.width = size;
  canvas.height = size;
}
window.addEventListener('resize', resize);
resize();

// --- Canvas coordinate helpers ---
function canvasOriginX() { return canvas.width / 2; }
function canvasOriginY() { return canvas.height - 40; }
function cmScale() { return (canvas.height - 80) / config.range; }

// Convert canvas pixel to cm coordinates (relative to primary device)
function canvasToCm(px, py) {
  const cx = canvasOriginX();
  const cy = canvasOriginY();
  const s = cmScale();
  return { x: Math.round((px - cx) / s), y: Math.round((cy - py) / s) };
}

// Mouse tracking for cursor coordinates
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const px = e.clientX - rect.left;
  const py = e.clientY - rect.top;
  const cm = canvasToCm(px, py);
  document.getElementById('cursorInfo').textContent = `x: ${cm.x} cm  y: ${cm.y} cm  (${(Math.sqrt(cm.x*cm.x+cm.y*cm.y)/100).toFixed(2)}m)`;
});
canvas.addEventListener('mouseleave', () => {
  document.getElementById('cursorInfo').textContent = '';
});

// --- Connection ---
function connect() {
  const ip = document.getElementById('hubIp').value.trim();
  if (ws) ws.close();

  ws = new WebSocket(`ws://${ip}/eventsocket`);

  ws.onopen = () => {
    document.getElementById('status').className = 'status connected';
    document.getElementById('status').textContent = `Connected to ${ip} (${devices.length} device${devices.length !== 1 ? 's' : ''})`;
    globalUpdateCount = 0;
    if (rateInterval) clearInterval(rateInterval);
    rateInterval = setInterval(() => {
      document.getElementById('infoRate').textContent = `${globalUpdateCount}/s`;
      globalUpdateCount = 0;
    }, 1000);
  };

  ws.onclose = () => {
    document.getElementById('status').className = 'status disconnected';
    document.getElementById('status').textContent = 'Disconnected';
    if (rateInterval) clearInterval(rateInterval);
  };

  ws.onerror = () => {
    document.getElementById('status').className = 'status disconnected';
    document.getElementById('status').textContent = 'Connection error';
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      const devIdStr = msg.deviceId?.toString();
      const device = devices.find(d => d.id === devIdStr);
      if (!device) return;

      if (msg.name === 'targetInfo') {
        handleTargetInfo(device, JSON.parse(msg.value));
      } else if (msg.name === 'illuminance') {
        device.illuminance = msg.value;
      } else if (msg.name === 'motion') {
        device.motion = msg.value;
      }
    } catch (e) {}
  };
}

function disconnect() {
  if (ws) ws.close();
  ws = null;
  devices.forEach(d => { d.targets = {}; });
}

function handleTargetInfo(device, data) {
  globalUpdateCount++;
  device.updateCount++;
  device.lastUpdate = Date.now();

  const activeIds = new Set();

  (data.targets || []).forEach(t => {
    activeIds.add(t.id);
    if (!device.targets[t.id]) {
      device.targets[t.id] = { x: t.x, y: t.y, z: t.z, dop: t.dop, trail: [] };
    }
    const target = device.targets[t.id];
    target.trail.push({ x: target.x, y: target.y });
    if (target.trail.length > config.trailLength) target.trail.shift();
    target.x = t.x;
    target.y = t.y;
    target.z = t.z;
    target.dop = t.dop;

    // Heatmap accumulation
    if (config.showHeatmap) {
      heatmapData.push({ x: t.x + (device.offsetX || 0), y: t.y + (device.offsetY || 0) });
      if (heatmapData.length > 10000) heatmapData = heatmapData.slice(-5000);
    }
  });

  // Remove stale targets
  Object.keys(device.targets).forEach(id => {
    if (!activeIds.has(parseInt(id))) delete device.targets[id];
  });

  updateInfoPanel();
  updateTargetList();
  updateZoneStatus();
}

// --- Device Management ---
function addDevice(id, name) {
  if (devices.find(d => d.id === id)) return;  // already added
  const paletteIdx = devices.length % DEVICE_PALETTES.length;
  devices.push({
    id, name,
    palette: DEVICE_PALETTES[paletteIdx],
    offsetX: 0, offsetY: 0,
    targets: {},
    illuminance: null, motion: null,
    lastUpdate: 0, updateCount: 0,
  });
  renderDeviceList();
  renderPresetGrid();
  renderZoneList();
  updateStatusText();
}

function removeDevice(id) {
  devices = devices.filter(d => d.id !== id);
  // Re-assign palettes
  devices.forEach((d, i) => d.palette = DEVICE_PALETTES[i % DEVICE_PALETTES.length]);
  renderDeviceList();
  renderPresetGrid();
  renderZoneList();
  updateStatusText();
}

function updateStatusText() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    const ip = document.getElementById('hubIp').value.trim();
    document.getElementById('status').textContent = `Connected to ${ip} (${devices.length} device${devices.length !== 1 ? 's' : ''})`;
  }
}

function renderPresetGrid() {
  const el = document.getElementById('presetGrid');
  el.innerHTML = PRESETS.map(p => {
    const active = devices.find(d => d.id === p.id);
    return `<button class="preset-btn ${active ? 'active' : ''}" onclick="${active ? `removeDevice('${p.id}')` : `addDevice('${p.id}','${p.name}')`}">${p.short}</button>`;
  }).join('');
}

function renderDeviceList() {
  const el = document.getElementById('deviceList');
  el.innerHTML = devices.map((d, i) => `
    <div class="device-item" style="border-color: ${d.palette.base}">
      <div class="device-header">
        <strong style="color: ${d.palette.base}">${d.name}</strong>
        <span style="font-size:10px; color:#888">ID: ${d.id}</span>
        <button class="danger small" onclick="removeDevice('${d.id}')">X</button>
      </div>
      <div class="device-stats">
        <span id="dev-targets-${d.id}">0 targets</span> |
        <span id="dev-lux-${d.id}">- lux</span> |
        <span id="dev-motion-${d.id}">-</span>
      </div>
      <div class="device-offset">
        <label>oX:</label><input type="number" value="${d.offsetX}" onchange="devices[${i}].offsetX=+this.value" placeholder="0">
        <label>oY:</label><input type="number" value="${d.offsetY}" onchange="devices[${i}].offsetY=+this.value" placeholder="0">
      </div>
    </div>
  `).join('');
}

function updateInfoPanel() {
  let totalTargets = 0;
  const summaryLines = [];
  devices.forEach(d => {
    const count = Object.keys(d.targets).length;
    totalTargets += count;
    const tEl = document.getElementById(`dev-targets-${d.id}`);
    if (tEl) tEl.textContent = `${count} target${count !== 1 ? 's' : ''}`;
    const lEl = document.getElementById(`dev-lux-${d.id}`);
    if (lEl) lEl.textContent = d.illuminance != null ? `${d.illuminance} lux` : '- lux';
    const mEl = document.getElementById(`dev-motion-${d.id}`);
    if (mEl) mEl.textContent = d.motion || '-';
    // Build summary
    const lux = d.illuminance != null ? `${d.illuminance} lux` : '-';
    const mot = d.motion || '-';
    summaryLines.push(`<div class="info-row"><span style="color:${d.palette.base}">${d.name}:</span><span class="val">${lux} | ${mot}</span></div>`);
  });
  document.getElementById('infoTargets').textContent = totalTargets;
  document.getElementById('sensorSummary').innerHTML = summaryLines.join('');
}

function updateTargetList() {
  const el = document.getElementById('targetList');
  const allTargets = [];
  devices.forEach(d => {
    Object.entries(d.targets).forEach(([id, t], idx) => {
      allTargets.push({ ...t, id, deviceName: d.name, deviceId: d.id, color: d.palette.targets[idx % d.palette.targets.length] });
    });
  });

  if (allTargets.length === 0) {
    el.innerHTML = '<em>No targets</em>';
    return;
  }
  el.innerHTML = allTargets.map(t => `
    <div class="target-item" style="border-color: ${t.color}">
      <strong>T${t.id}</strong> <span style="color:#888; font-size:10px">${t.deviceName}</span><br>
      x: ${t.x}cm  y: ${t.y}cm  z: ${t.z}cm<br>
      dop: ${t.dop}  (${(Math.sqrt(t.x*t.x + t.y*t.y)/100).toFixed(1)}m)
    </div>
  `).join('');
}

// --- Zone Management ---
function addZone() {
  const deviceId = devices.length > 0 ? devices[0].id : '';
  zones.push({ name: `Zone ${zones.length}`, xMin: -200, xMax: 200, yMin: 0, yMax: 200, deviceId });
  renderZoneList();
}

function removeZone(i) {
  zones.splice(i, 1);
  renderZoneList();
}

function renderZoneList() {
  const el = document.getElementById('zoneList');
  const deviceOptions = devices.map(d => `<option value="${d.id}">${d.name} (${d.id})</option>`).join('');

  el.innerHTML = zones.map((z, i) => `
    <div class="zone-item" style="border-color: ${zoneBorders[i % zoneBorders.length]}">
      <div class="zone-header">
        <input type="text" value="${z.name}" onchange="zones[${i}].name=this.value" style="width:55%; border:none; background:transparent; color:#e0e0e0;">
        <span id="zone-status-${i}" style="font-size:11px; color:#666">empty</span>
        <button class="danger small" onclick="removeZone(${i})">X</button>
      </div>
      <div class="zone-controls">
        <select onchange="zones[${i}].deviceId=this.value" ${devices.length <= 1 ? 'style="display:none"' : ''}>
          ${deviceOptions.replace(`value="${z.deviceId}"`, `value="${z.deviceId}" selected`)}
        </select>
        <input type="number" value="${z.xMin}" placeholder="xMin" onchange="zones[${i}].xMin=+this.value">
        <input type="number" value="${z.xMax}" placeholder="xMax" onchange="zones[${i}].xMax=+this.value">
        <input type="number" value="${z.yMin}" placeholder="yMin" onchange="zones[${i}].yMin=+this.value">
        <input type="number" value="${z.yMax}" placeholder="yMax" onchange="zones[${i}].yMax=+this.value">
      </div>
    </div>
  `).join('');
}

function updateZoneStatus() {
  zones.forEach((zone, i) => {
    const device = devices.find(d => d.id === zone.deviceId) || devices[0];
    if (!device) return;
    const tList = Object.values(device.targets);
    const occupied = tList.some(t =>
      t.x >= zone.xMin && t.x <= zone.xMax && t.y >= zone.yMin && t.y <= zone.yMax
    );
    zone._occupied = occupied;
    const el = document.getElementById(`zone-status-${i}`);
    if (el) {
      el.textContent = occupied ? 'OCCUPIED' : 'empty';
      el.style.color = occupied ? '#4caf50' : '#666';
    }
  });
}

function importZones() {
  try {
    const data = JSON.parse(document.getElementById('zoneJson').value);
    const defaultDevice = devices.length > 0 ? devices[0].id : '';
    zones = (data.zones || data).map(z => ({
      name: z.name || 'Zone',
      xMin: z.xMin, xMax: z.xMax, yMin: z.yMin, yMax: z.yMax,
      lights: z.lights, level: z.level,
      deviceId: z.deviceId || defaultDevice,
    }));
    renderZoneList();
  } catch (e) {
    alert('Invalid JSON: ' + e.message);
  }
}

function exportZones() {
  const json = JSON.stringify({ zones: zones.map(z => ({
    name: z.name, xMin: z.xMin, xMax: z.xMax, yMin: z.yMin, yMax: z.yMax,
    lights: z.lights || [], level: z.level || 100, deviceId: z.deviceId,
  }))}, null, 2);
  document.getElementById('zoneJson').value = json;
}

// --- Floorplan ---
function loadFloorplan(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => { floorplan.img = img; };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function loadFloorplanUrl(url) {
  if (!url) return;
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { floorplan.img = img; };
  img.onerror = () => { alert('Could not load image from URL'); };
  img.src = url;
}

function clearFloorplan() {
  floorplan.img = null;
  document.getElementById('floorplanFile').value = '';
  document.getElementById('floorplanUrl').value = '';
}

// --- Heatmap ---
function clearHeatmap() {
  heatmapData = [];
}

function drawHeatmap(cx, cy, scale) {
  if (heatmapData.length < 10) return;

  // Simple grid-based heatmap
  const gridSize = 20;  // cm per cell
  const cells = {};
  let maxCount = 0;

  heatmapData.forEach(p => {
    const gx = Math.floor(p.x / gridSize);
    const gy = Math.floor(p.y / gridSize);
    const key = `${gx},${gy}`;
    cells[key] = (cells[key] || 0) + 1;
    if (cells[key] > maxCount) maxCount = cells[key];
  });

  Object.entries(cells).forEach(([key, count]) => {
    const [gx, gy] = key.split(',').map(Number);
    const intensity = count / maxCount;
    const px = cx + gx * gridSize * scale;
    const py = cy - gy * gridSize * scale;
    const size = gridSize * scale;

    // Color: blue -> green -> yellow -> red
    let r, g, b;
    if (intensity < 0.33) {
      r = 0; g = Math.floor(intensity * 3 * 255); b = Math.floor((1 - intensity * 3) * 255);
    } else if (intensity < 0.66) {
      const t = (intensity - 0.33) * 3;
      r = Math.floor(t * 255); g = 255; b = 0;
    } else {
      const t = (intensity - 0.66) * 3;
      r = 255; g = Math.floor((1 - t) * 255); b = 0;
    }

    ctx.fillStyle = `rgba(${r},${g},${b},${Math.min(intensity * 0.6 + 0.1, 0.5)})`;
    ctx.fillRect(px, py - size, size, size);
  });
}

// --- Rendering ---
function draw() {
  const w = canvas.width;
  const h = canvas.height;
  const cx = canvasOriginX();
  const cy = canvasOriginY();
  const scale = cmScale();

  ctx.clearRect(0, 0, w, h);

  // Floorplan overlay (behind everything)
  if (floorplan.img) {
    ctx.save();
    ctx.globalAlpha = floorplan.opacity;
    ctx.translate(cx + floorplan.x, cy + floorplan.y);
    ctx.rotate(floorplan.rotation * Math.PI / 180);
    const fw = floorplan.img.width * floorplan.scale;
    const fh = floorplan.img.height * floorplan.scale;
    ctx.drawImage(floorplan.img, -fw / 2, -fh / 2, fw, fh);
    ctx.restore();
  }

  // Heatmap
  if (config.showHeatmap) {
    drawHeatmap(cx, cy, scale);
  }

  // Grid
  if (config.showGrid) {
    ctx.strokeStyle = '#1a2a4a';
    ctx.lineWidth = 0.5;
    for (let r = 100; r <= config.range; r += 100) {
      ctx.beginPath();
      ctx.arc(cx, cy, r * scale, Math.PI, 2 * Math.PI);
      ctx.stroke();
      ctx.fillStyle = '#334';
      ctx.font = '10px monospace';
      ctx.fillText(`${r/100}m`, cx + r * scale + 4, cy - 4);
    }
    ctx.beginPath();
    ctx.moveTo(0, cy);
    ctx.lineTo(w, cy);
    ctx.moveTo(cx, 0);
    ctx.lineTo(cx, h);
    ctx.stroke();
  }

  // FOV cones (one per device, offset)
  if (config.showFov) {
    const fovAngle = 130 * Math.PI / 180;
    const halfFov = fovAngle / 2;

    devices.forEach((d, di) => {
      const dcx = cx + (d.offsetX || 0) * scale;
      const dcy = cy - (d.offsetY || 0) * scale;

      ctx.fillStyle = d.palette.base + '06';
      ctx.beginPath();
      ctx.moveTo(dcx, dcy);
      ctx.arc(dcx, dcy, config.range * scale, Math.PI + (Math.PI/2 - halfFov), Math.PI + (Math.PI/2 + halfFov));
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = d.palette.base + '25';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(dcx, dcy);
      ctx.lineTo(dcx + Math.cos(Math.PI + Math.PI/2 - halfFov) * config.range * scale,
                 dcy + Math.sin(Math.PI + Math.PI/2 - halfFov) * config.range * scale);
      ctx.moveTo(dcx, dcy);
      ctx.lineTo(dcx + Math.cos(Math.PI + Math.PI/2 + halfFov) * config.range * scale,
                 dcy + Math.sin(Math.PI + Math.PI/2 + halfFov) * config.range * scale);
      ctx.stroke();
    });
  }

  // Zones (relative to their assigned device's offset)
  if (config.showZones) {
    zones.forEach((zone, i) => {
      const device = devices.find(d => d.id === zone.deviceId) || devices[0];
      const ox = device ? (device.offsetX || 0) : 0;
      const oy = device ? (device.offsetY || 0) : 0;

      const x1 = cx + (zone.xMin + ox) * scale;
      const x2 = cx + (zone.xMax + ox) * scale;
      const y1 = cy - (zone.yMax + oy) * scale;
      const y2 = cy - (zone.yMin + oy) * scale;

      ctx.fillStyle = zone._occupied ? zoneColors[i % zoneColors.length].replace('44', '66') : zoneColors[i % zoneColors.length];
      ctx.fillRect(x1, y1, x2 - x1, y2 - y1);

      ctx.strokeStyle = zone._occupied ? zoneBorders[i % zoneBorders.length] : zoneBorders[i % zoneBorders.length] + '66';
      ctx.lineWidth = zone._occupied ? 2 : 1;
      ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

      ctx.fillStyle = zoneBorders[i % zoneBorders.length];
      ctx.font = '11px monospace';
      ctx.fillText(zone.name, x1 + 4, y1 + 14);
    });
  }

  // Switch position markers (one per device)
  devices.forEach((d, di) => {
    const dcx = cx + (d.offsetX || 0) * scale;
    const dcy = cy - (d.offsetY || 0) * scale;

    // Switch dot
    ctx.fillStyle = d.palette.base;
    ctx.beginPath();
    ctx.arc(dcx, dcy, 5, 0, Math.PI * 2);
    ctx.fill();

    // Switch label
    ctx.font = '10px monospace';
    ctx.fillStyle = d.palette.base;
    const labelText = devices.length > 1 ? d.name : 'SWITCH';
    ctx.fillText(labelText, dcx - ctx.measureText(labelText).width / 2, dcy + 18);

    // Stale indicator
    if (d.lastUpdate > 0) {
      const age = Date.now() - d.lastUpdate;
      if (age > 5000) {
        ctx.fillStyle = '#f4433680';
        ctx.font = '9px monospace';
        ctx.fillText('STALE', dcx - 15, dcy + 28);
      }
    }
  });

  // Targets (drawn per device with offset)
  // Z-height bands: standing (z > -30), seated (-30 to -60), floor/pet (< -60)
  devices.forEach((d, di) => {
    const ox = (d.offsetX || 0) * scale;
    const oy = (d.offsetY || 0) * scale;

    Object.entries(d.targets).forEach(([id, t], idx) => {
      const color = d.palette.targets[idx % d.palette.targets.length];
      const tx = cx + t.x * scale + ox;
      const ty = cy - t.y * scale - oy;

      // Z-height classification
      let zBand, zColor, zRingColor, dotSize, zLabel;
      if (t.z > -30) {
        zBand = 'standing';
        zColor = color;
        zRingColor = '#4fc3f7';  // blue ring
        dotSize = 7;
        zLabel = 'S';  // standing
      } else if (t.z > -60) {
        zBand = 'seated';
        zColor = color;
        zRingColor = '#ffeb3b';  // yellow ring
        dotSize = 5;
        zLabel = 'C';  // crouching/seated
      } else {
        zBand = 'floor';
        zColor = color;
        zRingColor = '#ff9800';  // orange ring
        dotSize = 4;
        zLabel = 'F';  // floor/pet
      }

      // Trail
      if (t.trail.length > 1) {
        ctx.beginPath();
        ctx.strokeStyle = color + '40';
        ctx.lineWidth = zBand === 'floor' ? 1 : 2;
        t.trail.forEach((p, i) => {
          const px = cx + p.x * scale + ox;
          const py = cy - p.y * scale - oy;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        });
        ctx.lineTo(tx, ty);
        ctx.stroke();
      }

      // Target shape — circle for standing/seated, diamond for floor
      if (zBand === 'floor') {
        // Diamond
        ctx.beginPath();
        ctx.fillStyle = zColor;
        ctx.moveTo(tx, ty - dotSize);
        ctx.lineTo(tx + dotSize, ty);
        ctx.lineTo(tx, ty + dotSize);
        ctx.lineTo(tx - dotSize, ty);
        ctx.closePath();
        ctx.fill();
      } else {
        // Circle
        ctx.beginPath();
        ctx.fillStyle = zColor;
        ctx.arc(tx, ty, dotSize, 0, Math.PI * 2);
        ctx.fill();
      }

      // Z-height ring (color-coded)
      ctx.beginPath();
      ctx.strokeStyle = zRingColor + 'aa';
      ctx.lineWidth = 2;
      ctx.arc(tx, ty, dotSize + 4, 0, Math.PI * 2);
      ctx.stroke();

      // Doppler ring (outside the z-ring)
      const dopplerSize = Math.min(Math.abs(t.dop) / 50, 20);
      if (dopplerSize > 2) {
        ctx.beginPath();
        ctx.strokeStyle = color + '60';
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.arc(tx, ty, dotSize + 4 + dopplerSize, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Label
      if (config.showLabels) {
        ctx.fillStyle = color;
        ctx.font = '11px monospace';
        const label = devices.length > 1 ? `${d.name[0]}:T${id}` : `T${id}`;
        ctx.fillText(label, tx + 14, ty - 8);

        // Z badge
        ctx.fillStyle = zRingColor;
        ctx.font = 'bold 9px monospace';
        ctx.fillText(zLabel, tx - 3, ty + 3);

        ctx.font = '9px monospace';
        ctx.fillStyle = '#999';
        ctx.fillText(`${t.x},${t.y}`, tx + 14, ty + 4);
        ctx.fillStyle = zRingColor + 'cc';
        ctx.fillText(`z:${t.z}`, tx + 14, ty + 14);
        if (t.dop !== 0) {
          ctx.fillStyle = t.dop > 0 ? '#ff980080' : '#4caf5080';
          ctx.fillText(`dop:${t.dop}`, tx + 14, ty + 24);
        }
      }
    });
  });

  // Timestamp / status overlay
  const activeDevices = devices.filter(d => d.lastUpdate > 0);
  if (activeDevices.length > 0) {
    let yPos = 20;
    activeDevices.forEach(d => {
      const age = Date.now() - d.lastUpdate;
      ctx.fillStyle = age < 2000 ? '#4caf50' : age < 5000 ? '#ff9800' : '#f44336';
      ctx.font = '10px monospace';
      const tCount = Object.keys(d.targets).length;
      ctx.fillText(`${d.name}: ${tCount} target${tCount !== 1 ? 's' : ''} (${age < 1000 ? 'now' : (age/1000).toFixed(1) + 's'})`, 10, yPos);
      yPos += 14;
    });
  }

  // Z-height legend (bottom-right)
  const legendX = w - 160;
  const legendY = h - 60;
  ctx.fillStyle = '#0f0f23cc';
  ctx.fillRect(legendX - 8, legendY - 14, 165, 56);

  ctx.font = '9px monospace';
  // Standing
  ctx.fillStyle = '#4fc3f7';
  ctx.beginPath(); ctx.arc(legendX, legendY, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.fillText('S  Standing (z > -30)', legendX + 10, legendY + 3);
  // Seated
  ctx.fillStyle = '#ffeb3b';
  ctx.beginPath(); ctx.arc(legendX, legendY + 16, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.fillText('C  Seated   (-60 < z < -30)', legendX + 10, legendY + 19);
  // Floor
  ctx.fillStyle = '#ff9800';
  ctx.beginPath();
  ctx.moveTo(legendX, legendY + 28); ctx.lineTo(legendX + 4, legendY + 32);
  ctx.lineTo(legendX, legendY + 36); ctx.lineTo(legendX - 4, legendY + 32);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.fillText('F  Floor/Pet (z < -60)', legendX + 10, legendY + 35);

  requestAnimationFrame(draw);
}

// --- Init ---
addDevice('1405', 'Theatre');
renderPresetGrid();
draw();
</script>
</body>
